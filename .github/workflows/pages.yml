name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; queued runs wait instead of racing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare artifact
        run: |
          # Pages has no rewrite rule, so SPA routes (/new, /chat/<id>) are
          # served through 404.html — the app shell, which then reads the URL.
          cp public/index.html public/404.html
          # Without this, Pages runs the site through Jekyll.
          touch public/.nojekyll
          # Absolute paths (/res/..., sw.js scope) require the apex domain.
          echo "ulocalai.com" > public/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
